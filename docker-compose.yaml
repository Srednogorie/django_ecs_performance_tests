services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: django_ecs_test
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  web-wsgi:
    image: django-wsgi
    build:
      context: .
      dockerfile: wsgi.Dockerfile
    depends_on:
      - db
    command: >
      sh -c "
      python manage.py makemigrations &&
      python manage.py migrate &&
      taskset -c 0 granian --host 0.0.0.0 --port 8000 django_ecs_performance_tests.wsgi:application --interface wsgi --workers 3 --no-ws --loop uvloop --log-level debug --log --workers-lifetime 10800 --respawn-interval 30
      "
    ports:
      - "8000:8000"

  web-asgi:
    image: django-asgi
    build:
      context: .
      dockerfile: asgi.Dockerfile
    depends_on:
      - db
    command: >
      sh -c "
      python manage.py makemigrations &&
      python manage.py migrate &&
      taskset -c 1 granian --host 0.0.0.0 --port 8001 django_ecs_performance_tests.asgi:application --interface asgi --workers 1 --loop uvloop --log-level debug
      "
    ports:
      - "8001:8001"
